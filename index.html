<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cupcake Site</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    #navbar {
      display: none;
      background-color: #333;
      padding: 10px 20px;
    }

    #navbar a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
    }

    #navbar a:hover {
      text-decoration: underline;
    }

    .form-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    input[type="text"] {
      padding: 8px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 250px;
    }

    button[type="submit"] {
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav id="navbar">
    <a href="apologies.html">apologies</a>
  </nav>

  <div class="form-container">
    <form id="password-form">
      <label for="password-input">Enter Password:</label>
      <input type="password" id="password-input" placeholder="Password" required />
      <button type="submit">Submit</button>
    </form>
  </div>

  <script src="menu_bar.js"></script>
</body>
</html>
